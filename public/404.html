<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | MLawyer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c5a059; /* Gold-ish accent for legal theme */
            --text-light: #666;
            --bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Josefin Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            animation: fadeInDown 1s ease-out;
        }

        .error-message {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-weight: 600;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .error-description {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .btn-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid var(--primary);
            animation: fadeInUp 1s ease-out 0.6s both;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-home:hover {
            background-color: transparent;
            color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        /* Abstract Decorative Elements */
        .decoration {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        .dec-1 { top: -100px; left: -100px; }
        .dec-2 { bottom: -100px; right: -100px; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .error-code { font-size: 6rem; }
            .error-message { font-size: 1.25rem; }
            .error-description { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="decoration dec-1"></div>
    <div class="decoration dec-2"></div>
    
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-message">Oops! Case Dismissed.</h1>
        <p class="error-description">
            The page you are looking for has been moved, removed, renamed or might never have existed. 
            Let's get you back to the right path.
        </p>
        <a href="/" class="btn-home">Return to Homepage</a>
    </div>
</body>
</html>
